          type: boolean

    ImpersonateResponse:
      type: object
      required: [signInToken, targetUser]
      properties:
        signInToken:
          type: string
          description: Clerk actor sign-in token/ticket to activate the impersonated session on the client.
        targetUser:
          $ref: "#/components/schemas/AdminUser"

    StopImpersonationResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    ImpersonationLog:
      type: object
      required: [id, adminId, targetUserId, startTime, isActive]
      properties:
        id:
          type: integer
        adminId:
          type: integer
        adminName:
          type: ["string", "null"]
        targetUserId:
          type: integer
        targetName:
          type: ["string", "null"]
        startTime:
          type: string
        endTime:
          type: ["string", "null"]
        isActive:
          type: boolean
        ipAddress:
          type: ["string", "null"]
        userAgent:
          type: ["string", "null"]
