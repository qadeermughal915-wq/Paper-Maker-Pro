openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: paperz.pk — school exam paper maker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: session
    description: Current user session and onboarding
  - name: school
    description: School profile management
  - name: teachers
    description: Teacher management (school admin)
  - name: taxonomy
    description: Classes, subjects, chapters, topics
  - name: questions
    description: Question bank
  - name: papers
    description: Paper generation and management
  - name: packages
    description: Subscription packages
  - name: admin
    description: Super admin operations
  - name: stats
    description: Dashboard statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      operationId: getMe
      tags: [session]
      summary: Get current authenticated user
      description: Returns the current user with role and school, provisioning a local record if needed.
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /onboarding/school:
    post:
      operationId: onboardSchool
      tags: [session]
      summary: Create a school during onboarding
      description: Creates a new school and assigns the current user as its school admin, seeding starter content.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SchoolInput"
      responses:
        "201":
          description: School created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /school:
    get:
      operationId: getSchool
      tags: [school]
      summary: Get the current user's school
      responses:
        "200":
          description: School
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/School"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      operationId: updateSchool
      tags: [school]
      summary: Update the current user's school
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SchoolUpdate"
      responses:
        "200":
          description: Updated school
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/School"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /teachers:
    get:
      operationId: listTeachers
      tags: [teachers]
      summary: List teachers in the school
      responses:
        "200":
          description: Teachers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Teacher"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createTeacher
      tags: [teachers]
      summary: Invite/add a teacher to the school
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeacherInput"
      responses:
        "201":
          description: Teacher created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /teachers/{id}:
    patch:
      operationId: updateTeacher
      tags: [teachers]
      summary: Update a teacher
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeacherUpdate"
      responses:
        "200":
          description: Updated teacher
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteTeacher
      tags: [teachers]
      summary: Remove a teacher
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /classes:
    get:
      operationId: listClasses
      tags: [taxonomy]
      summary: List classes
      responses:
        "200":
          description: Classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Class"
    post:
      operationId: createClass
      tags: [taxonomy]
      summary: Create a class
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassInput"
      responses:
        "201":
          description: Class created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Class"
  /classes/{id}:
    patch:
      operationId: updateClass
      tags: [taxonomy]
      summary: Update a class
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassUpdate"
      responses:
        "200":
          description: Updated class
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Class"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteClass
      tags: [taxonomy]
      summary: Delete a class
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /subjects:
    get:
      operationId: listSubjects
      tags: [taxonomy]
      summary: List subjects
      parameters:
        - name: classId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Subjects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subject"
    post:
      operationId: createSubject
      tags: [taxonomy]
      summary: Create a subject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubjectInput"
      responses:
        "201":
          description: Subject created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"
  /subjects/{id}:
    patch:
      operationId: updateSubject
      tags: [taxonomy]
      summary: Update a subject
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubjectUpdate"
      responses:
        "200":
          description: Updated subject
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteSubject
      tags: [taxonomy]
      summary: Delete a subject
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /chapters:
    get:
      operationId: listChapters
      tags: [taxonomy]
      summary: List chapters
      parameters:
        - name: subjectId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Chapters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Chapter"
    post:
      operationId: createChapter
      tags: [taxonomy]
      summary: Create a chapter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChapterInput"
      responses:
        "201":
          description: Chapter created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chapter"
  /chapters/{id}:
    patch:
      operationId: updateChapter
      tags: [taxonomy]
      summary: Update a chapter
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChapterUpdate"
      responses:
        "200":
          description: Updated chapter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chapter"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteChapter
      tags: [taxonomy]
      summary: Delete a chapter
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /topics:
    get:
      operationId: listTopics
      tags: [taxonomy]
      summary: List topics
      parameters:
        - name: chapterId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Topics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Topic"
    post:
      operationId: createTopic
      tags: [taxonomy]
      summary: Create a topic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopicInput"
      responses:
        "201":
          description: Topic created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Topic"
  /topics/{id}:
    patch:
      operationId: updateTopic
      tags: [taxonomy]
      summary: Update a topic
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopicUpdate"
      responses:
        "200":
          description: Updated topic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Topic"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteTopic
      tags: [taxonomy]
      summary: Delete a topic
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /questions:
    get:
      operationId: listQuestions
      tags: [questions]
      summary: List and filter questions
      parameters:
        - name: classId
          in: query
          schema:
            type: integer
        - name: subjectId
          in: query
          schema:
            type: integer
        - name: chapterId
          in: query
          schema:
            type: integer
        - name: topicId
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/QuestionType"
        - name: medium
          in: query
          schema:
            $ref: "#/components/schemas/Medium"
        - name: difficulty
          in: query
          schema:
            $ref: "#/components/schemas/Difficulty"
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
    post:
      operationId: createQuestion
      tags: [questions]
      summary: Create a question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionInput"
      responses:
        "201":
          description: Question created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "400":
          $ref: "#/components/responses/BadRequest"
  /questions/import:
    post:
      operationId: importQuestions
      tags: [questions]
      summary: Bulk import questions from parsed CSV/Excel rows
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionImportInput"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"
        "400":
          $ref: "#/components/responses/BadRequest"
  /questions/{id}:
    get:
      operationId: getQuestion
      tags: [questions]
      summary: Get a question
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateQuestion
      tags: [questions]
      summary: Update a question
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionUpdate"
      responses:
        "200":
          description: Updated question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteQuestion
      tags: [questions]
      summary: Delete a question
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /papers:
    get:
      operationId: listPapers
      tags: [papers]
      summary: List saved papers
      responses:
        "200":
          description: Papers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaperSummary"
    post:
      operationId: createPaper
      tags: [papers]
      summary: Save a paper with its questions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaperInput"
      responses:
        "201":
          description: Paper created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Paper"
        "400":
          $ref: "#/components/responses/BadRequest"
  /papers/generate:
    post:
      operationId: generatePaper
      tags: [papers]
      summary: Auto-generate a draft paper from the question bank
      description: Returns an unsaved draft paper with selected questions based on the criteria.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneratePaperInput"
      responses:
        "200":
          description: Draft paper
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Paper"
        "400":
          $ref: "#/components/responses/BadRequest"
  /papers/availability:
    get:
      operationId: getPaperAvailability
      tags: [papers]
      summary: Available question counts per type for paper generation
      description: >-
        Returns how many questions (and how many marks) are available per
        question type for the given class/subject filters, so the New Paper
        screen can show supply before generating.
      parameters:
        - name: classId
          in: query
          required: true
          schema:
            type: integer
        - name: subjectId
          in: query
          required: true
          schema:
            type: integer
        - name: medium
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Medium"
        - name: chapterIds
          in: query
          schema:
            type: array
            items:
              type: integer
        - name: difficulty
          in: query
          schema:
            $ref: "#/components/schemas/Difficulty"
      responses:
        "200":
          description: Availability per question type
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuestionAvailability"
        "400":
          $ref: "#/components/responses/BadRequest"
  /papers/{id}:
    get:
      operationId: getPaper
      tags: [papers]
      summary: Get a paper with its questions
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Paper
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Paper"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updatePaper
      tags: [papers]
      summary: Update a paper and its questions
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaperUpdate"
      responses:
        "200":
          description: Updated paper
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Paper"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deletePaper
      tags: [papers]
      summary: Delete a paper
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /packages:
    get:
      operationId: listPackages
      tags: [packages]
      summary: List subscription packages
      responses:
        "200":
          description: Packages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Package"
    post:
      operationId: createPackage
      tags: [packages]
      summary: Create a package (super admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackageInput"
      responses:
        "201":
          description: Package created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"
  /packages/{id}:
    patch:
      operationId: updatePackage
      tags: [packages]
      summary: Update a package (super admin)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackageUpdate"
      responses:
        "200":
          description: Updated package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deletePackage
      tags: [packages]
      summary: Delete a package (super admin)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /subscription:
    get:
      operationId: getSubscription
      tags: [packages]
      summary: Get the current school's subscription
      responses:
        "200":
          description: Subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: subscribe
      tags: [packages]
      summary: Subscribe the current school to a package
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionInput"
      responses:
        "200":
          description: Subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "400":
          $ref: "#/components/responses/BadRequest"

  /admin/schools:
    get:
      operationId: listAllSchools
      tags: [admin]
      summary: List all schools (super admin)
      responses:
        "200":
          description: Schools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminSchool"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /stats/school:
    get:
      operationId: getSchoolStats
      tags: [stats]
      summary: Dashboard stats for the current school
      responses:
        "200":
          description: School stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchoolStats"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /stats/admin:
    get:
      operationId: getAdminStats
      tags: [stats]
      summary: Platform-wide stats (super admin)
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /stats/questions-by-type:
    get:
      operationId: getQuestionsByType
      tags: [stats]
      summary: Question counts grouped by type for the current school
      responses:
        "200":
          description: Grouped counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TypeCount"
  /stats/recent-papers:
    get:
      operationId: getRecentPapers
      tags: [stats]
      summary: Recent papers for the current school
      responses:
        "200":
          description: Recent papers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaperSummary"

  /views:
    get:
      operationId: listViews
      tags: [views]
      summary: List saved table views for the current user
      parameters:
        - name: tableKey
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Views
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TableView"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createView
      tags: [views]
      summary: Save a table view
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TableViewInput"
      responses:
        "201":
          description: Created view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TableView"
        "400":
          $ref: "#/components/responses/BadRequest"
  /views/{id}:
    patch:
      operationId: updateView
      tags: [views]
      summary: Update a saved view
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TableViewUpdate"
      responses:
        "200":
          description: Updated view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TableView"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteView
      tags: [views]
      summary: Delete a saved view
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /questions/search:
    get:
      operationId: searchQuestions
      tags: [questions]
      summary: Paginated, sorted, filtered question search for server-side grids
      parameters:
        - name: classId
          in: query
          schema:
            type: integer
        - name: subjectId
          in: query
          schema:
            type: integer
        - name: chapterId
          in: query
          schema:
            type: integer
        - name: topicId
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/QuestionType"
        - name: medium
          in: query
          schema:
            $ref: "#/components/schemas/Medium"
        - name: difficulty
          in: query
          schema:
            $ref: "#/components/schemas/Difficulty"
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: sortBy
          in: query
          schema:
            type: string
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: Paged questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionPage"

  /payments:
    get:
      operationId: listPayments
      tags: [billing]
      summary: List payments for the current school
      responses:
        "200":
          description: Payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /activity:
    get:
      operationId: listActivity
      tags: [activity]
      summary: List recent activity for the current school
      responses:
        "200":
          description: Activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /imports:
    get:
      operationId: listImports
      tags: [activity]
      summary: List import history for the current school
      responses:
        "200":
          description: Import history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ImportRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List paper templates for the current school
      responses:
        "200":
          description: Templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaperTemplate"
    post:
      operationId: createTemplate
      tags: [templates]
      summary: Create a paper template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaperTemplateInput"
      responses:
        "201":
          description: Created template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperTemplate"
        "400":
          $ref: "#/components/responses/BadRequest"
  /templates/{id}:
    patch:
      operationId: updateTemplate
      tags: [templates]
      summary: Update a paper template
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaperTemplateUpdate"
      responses:
        "200":
          description: Updated template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperTemplate"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteTemplate
      tags: [templates]
      summary: Delete a paper template
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/users:
    get:
      operationId: listAllUsers
      tags: [admin]
      summary: List all platform users (super admin)
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/impersonate/{userId}:
    post:
      operationId: startImpersonation
      tags: [admin]
      summary: Start impersonating another user (super admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Impersonation started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImpersonateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          description: Too many impersonation attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/stop-impersonation:
    post:
      operationId: stopImpersonation
      tags: [admin]
      summary: End the current impersonation session
      responses:
        "200":
          description: Impersonation stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopImpersonationResult"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/impersonation-logs:
    get:
      operationId: listImpersonationLogs
      tags: [admin]
      summary: List impersonation audit history (super admin)
      responses:
        "200":
          description: Impersonation logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ImpersonationLog"
        "401":
          $ref: "#/components/responses/Unauthorized"

